name: Build OnePlus Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Kernel
        uses: ./.github/actions
        with:
          model: OP12
          soc: pineapple
          branch: oneplus/sm8650
          manifest: oneplus12_v.xml
          android_version: android14
          kernel_version: "6.1"
          ksun_branch: next
          susfs_branch: gki-android14-6.1
